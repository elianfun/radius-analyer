{% extends "base.html" %}
{% block content %}
<h1>RADIUS MAB 管理系統</h1>

<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
  <h2 style="margin:0;font-size:1rem;color:#888;font-weight:400">資料庫複寫狀態</h2>
  <button class="sm" onclick="loadRepl()">↻ 重新整理</button>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px">
  <div id="repl-22" class="card repl-card"><div class="label">192.168.50.22</div><div class="repl-row">載入中…</div></div>
  <div id="repl-23" class="card repl-card"><div class="label">192.168.50.23</div><div class="repl-row">載入中…</div></div>
</div>

<div class="summary-grid">
  <div class="card"><div class="label">已登記設備總數</div><div class="value" id="s_total">-</div></div>
  <div class="card"><div class="label">30 天內活躍</div><div class="value" id="s_30">-</div></div>
  <div class="card"><div class="label">90 天內活躍</div><div class="value" id="s_90">-</div></div>
  <div class="card warn"><div class="label">90 天未認證</div><div class="value" id="s_inactive">-</div></div>
  <div class="card warn"><div class="label">從未認證</div><div class="value" id="s_never">-</div></div>
  <div class="card warn"><div class="label">已停用</div><div class="value" id="s_disabled">-</div></div>
  <div class="card info"><div class="label">累計 Accept</div><div class="value small" id="s_accept">-</div></div>
  <div class="card danger-card"><div class="label">累計 Reject</div><div class="value small" id="s_reject">-</div></div>
</div>

<div class="grid2">
  <div class="section">
    <h2>每日認證趨勢（近 30 天）</h2>
    <canvas id="dailyChart"></canvas>
  </div>
  <div class="section">
    <h2>群組設備分布</h2>
    <canvas id="groupChart"></canvas>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
function renderReplNode(n, other) {
  if (n.error) return `
    <div class="label">${n.host}</div>
    <div class="rc-status error">${n.label} 異常</div>
    <div class="repl-details">
      <div class="repl-row"><span class="dot red"></span>${n.error}</div>
    </div>`;

  const ioDot  = n.io_running  === 'Yes' ? 'green' : 'red';
  const sqlDot = n.sql_running === 'Yes' ? 'green' : 'red';
  const lagTag = n.seconds_behind === 0 ? 'tag-green' : n.seconds_behind < 30 ? 'tag-yellow' : 'tag-red';

  // 交叉同步驗證：n 當主機，other 是跟上來了嗎？
  let syncHtml = '';
  if (other && !other.error && n.master_file) {
    const sameFile = n.master_file === other.master_log_file;
    const gap      = sameFile ? Math.max(n.master_pos - other.read_pos, 0) : null;
    const gapTag   = gap === 0 ? 'tag-green' : gap === null ? 'tag-yellow' : 'tag-red';
    const gapLabel = gap === null
      ? '檔案不同（輪替中）'
      : gap === 0 ? '已完全同步' : `落後 ${gap.toLocaleString()} bytes`;
    syncHtml = `
      <div class="repl-subhead">本機作為主機（被 ${other.label} 複寫）</div>
      <div class="repl-row">本機 Binlog：${n.master_file} @ ${n.master_pos.toLocaleString()}</div>
      <div class="repl-row">${other.label} 已讀至：${other.master_log_file} @ ${other.read_pos.toLocaleString()}</div>
      <div class="repl-row">同步狀態：<span class="${gapTag}">${gapLabel}</span></div>`;
  }

  return `
    <div class="label">${n.host}</div>
    <div class="rc-status ${n.ok ? 'ok' : 'error'}">${n.label} &nbsp;${n.ok ? '正常' : '異常'}</div>
    <div class="repl-details">
      <div class="repl-subhead">本機作為從機（複寫自 ${n.master_host}）</div>
      <div class="repl-row"><span class="dot ${ioDot}"></span>IO Thread：${n.io_running}
        ${n.io_state ? `<span class="dim" style="margin-left:6px;font-size:.78rem">${n.io_state}</span>` : ''}</div>
      <div class="repl-row"><span class="dot ${sqlDot}"></span>SQL Thread：${n.sql_running}</div>
      <div class="repl-row">複寫延遲：<span class="${lagTag}">${n.seconds_behind} 秒</span></div>
      <div class="repl-row">已複寫事件：${n.events_applied.toLocaleString()} 筆 &nbsp;<span class="dim">Relay Log ${n.relay_log_mb} MB</span></div>
    </div>
    ${syncHtml ? `<div class="repl-details" style="margin-top:10px">${syncHtml}</div>` : ''}`;
}

function loadRepl() {
  fetch('/api/stats/replication').then(r => r.json()).then(nodes => {
    nodes.sort((a, b) => a.host.localeCompare(b.host));
    nodes.forEach((n, i) => {
      const other = nodes[1 - i];
      const el = document.getElementById('repl-' + n.host.split('.').pop());
      if (!el) return;
      el.className = 'card repl-card ' + (n.ok ? 'ok' : 'error');
      el.innerHTML = renderReplNode(n, other);
    });
  }).catch(() => {
    ['repl-22','repl-23'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.className = 'card repl-card error'; el.innerHTML = '<div class="repl-row">無法取得複寫狀態</div>'; }
    });
  });
}
loadRepl();

fetch('/api/stats/summary').then(r => r.json()).then(d => {
  document.getElementById('s_total').textContent    = d.total.toLocaleString();
  document.getElementById('s_30').textContent       = d.active_30.toLocaleString();
  document.getElementById('s_90').textContent       = d.active_90.toLocaleString();
  document.getElementById('s_inactive').textContent = d.inactive_90.toLocaleString();
  document.getElementById('s_never').textContent    = d.never.toLocaleString();
  document.getElementById('s_disabled').textContent = d.disabled.toLocaleString();
  document.getElementById('s_accept').textContent   = d.total_accept.toLocaleString();
  document.getElementById('s_reject').textContent   = d.total_reject.toLocaleString();
});

fetch('/api/stats/daily').then(r => r.json()).then(data => {
  new Chart(document.getElementById('dailyChart'), {
    type: 'bar',
    data: {
      labels: data.map(d => d.date),
      datasets: [
        { label: 'Accept', data: data.map(d => d.accept), backgroundColor: '#4f80e1', stack: 'a' },
        { label: 'Reject', data: data.map(d => d.reject), backgroundColor: '#e14f6a', stack: 'a' },
        { label: '不重複設備', data: data.map(d => d.unique_devices),
          type: 'line', borderColor: '#2ab56e', backgroundColor: 'transparent', yAxisID: 'y1' }
      ]
    },
    options: { responsive: true, scales: {
      y:  { beginAtZero: true, stacked: true },
      y1: { beginAtZero: true, position: 'right' }
    }}
  });
});

fetch('/api/stats/by-group').then(r => r.json()).then(data => {
  new Chart(document.getElementById('groupChart'), {
    type: 'doughnut',
    data: {
      labels: data.map(d => `${d.groupname} (${d.total})`),
      datasets: [{ data: data.map(d => d.total),
        backgroundColor: ['#4f80e1','#2ab56e','#f5a623','#e14f6a','#9b59b6','#1abc9c','#e67e22','#95a5a6'] }]
    },
    options: { responsive: true, plugins: { legend: { position: 'right' } } }
  });
});
</script>
{% endblock %}
